apiVersion: v1
kind: Service

metadata:
  name: order-service
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/path: "/actuator/prometheus"
    prometheus.io/port: "8081"

spec:
  selector:
    app: order-service

  ports:
    - port: 8081
      targetPort: 8081
      protocol: TCP

  type: NodePort
